server.port=9001
spring.application.name=API-GATEWAY

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Route 0: Authentication (login/register) — USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].id=AUTH-ROUTE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

# Route 1: USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].id=USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=\
/api/wut/jira-users/**,\
/api/wut/profile/**,\
/api/wut/sites/**,\
/api/wut/users/**,\
/api/wut/credentials/**,\
/api/wut/integration-credentials/**,\
/api/wut/logs/**

# Route 2: ISSUES-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].id=ISSUES-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://ISSUES-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/wut/issues/**,/api/wut/comments/**,/api/wut/jira/comment/**,/api/jira/issues/**

# Route 3: PROJECT-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].id=PROJECT-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://PROJECT-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/wut/projects/**

# Route 4: MCP-SERVER
spring.cloud.gateway.server.webmvc.routes[4].id=MCP-SERVER
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://MCP-SERVER
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/wut/mcp/**


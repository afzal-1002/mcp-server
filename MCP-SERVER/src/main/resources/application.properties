spring.application.name=MCP-SERVER
server.port=${MCP_SERVER_PORT:8084}

spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.name=jira-github-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.annotation-scanner.enabled=false

mcp.jira.api-version=${JIRA_API_VERSION:3}
mcp.jira.default-max-results=${JIRA_DEFAULT_MAX_RESULTS:25}

mcp.github.host=${GITHUB_HOST:github.gsissc.myatos.net}
mcp.github.api-base-url=${GITHUB_API_BASE_URL:}
mcp.github.owner=${GITHUB_OWNER:}
mcp.github.repository=${GITHUB_REPOSITORY:}
mcp.github.target-repository=${GITHUB_TARGET_REPOSITORY:}
mcp.github.base-branch=${GITHUB_BASE_BRANCH:main}
mcp.github.custom-agent=${GITHUB_COPILOT_CUSTOM_AGENT:}
mcp.github.model=${GITHUB_COPILOT_MODEL:}
mcp.github.copilot-assignee=${GITHUB_COPILOT_ASSIGNEE:copilot-swe-agent[bot]}
mcp.github.api-version=${GITHUB_API_VERSION:2022-11-28}

mcp.services.user-service-url=${USER_SERVICE_URL:http://localhost:8081}
mcp.services.project-service-url=${PROJECT_SERVICE_URL:http://localhost:8082}

eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.myatos.net.mcp.controller

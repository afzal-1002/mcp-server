spring.application.name=ISSUES-SERVICE

server.port=8083

# DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/issue_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:mafzal}
spring.datasource.password=${DB_PASSWORD:mafzal}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

project.service.base-url=${PROJECT_SERVICE_URL:http://localhost:8082}
user.service.url=${USER_SERVICE_URL:http://localhost:8081}

security.jwt.secret=${JWT_SECRET:VGhpc0lzQURldmVsb3BtZW50SldUU2VjcmV0VGhhdE11c3RCZUF0TGVhc3QzMkJ5dGVz}

eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# =========================================
# Swagger / OpenAPI
# =========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
